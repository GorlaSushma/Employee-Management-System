<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Management System</title>

    <style>
      /* ===== GLOBAL RESET ===== */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f6f8;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        width: 380px;
        background: #ffffff;
        padding: 40px 30px;
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }

      h1 {
        text-align: center;
        margin-bottom: 10px;
        color: #333;
      }

      p {
        text-align: center;
        margin-bottom: 25px;
        color: #777;
        font-size: 14px;
      }

      .form-group {
        position: relative;
        margin: 30px 0;
      }

      .form-group input {
        width: 100%;
        padding: 12px 0 6px 0;
        border: none;
        border-bottom: 2px solid #ccc;
        background: transparent;
        font-size: 16px;
        outline: none;
      }

      .form-group label {
        position: absolute;
        left: 0;
        top: 12px;
        font-size: 16px;
        color: #9e9e9e;
        pointer-events: none;
        transition: 0.3s ease all;
      }

      .form-group input:focus ~ label,
      .form-group input:not(:placeholder-shown) ~ label {
        top: -8px;
        font-size: 13px;
        color: #1976d2;
      }

      button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: #1976d2;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      button:hover {
        background: #125aa3;
      }

      a {
        display: block;
        text-align: center;
        margin-top: 15px;
        text-decoration: none;
        font-size: 14px;
        color: #1976d2;
      }

      table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        border: 1px solid #ccc;
        padding: 6px;
        text-align: left;
      }

      th {
        background: #1976d2;
        color: white;
      }
    </style>

    <script>
      // ===== UTIL: HASH PASSWORD =====
      async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hashBuffer = await crypto.subtle.digest("SHA-256", data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map((b) => b.toString(16).padStart(2, "0")).join("");
      }

      // ===== SHOW LOGIN/SIGNUP =====
      function show(shown, hidden) {
        document.getElementById(shown).style.display = "block";
        document.getElementById(hidden).style.display = "none";
        return false;
      }

      // ===== REGISTER =====
      async function register(event) {
        event.preventDefault();

        const username = document
          .getElementById("signup-username")
          .value.trim();
        const email = document.getElementById("signup-email").value.trim();
        const password = document
          .getElementById("signup-password")
          .value.trim();

        if (localStorage.getItem("user_" + username)) {
          alert("User already exists!");
          return;
        }

        const hashedPassword = await hashPassword(password);

        const userData = {
          email,
          password: hashedPassword,
        };

        localStorage.setItem("user_" + username, JSON.stringify(userData));

        alert("Registration successful! Please login.");
        show("login", "signup");
      }

      // ===== LOGIN =====
      async function authenticate(event) {
        event.preventDefault();

        const username = document.getElementById("login-username").value.trim();
        const password = document.getElementById("login-password").value.trim();

        const storedUser = localStorage.getItem("user_" + username);

        if (!storedUser) {
          alert("User not found!");
          return;
        }

        const userData = JSON.parse(storedUser);
        const hashedInput = await hashPassword(password);

        if (userData.password === hashedInput) {
          localStorage.setItem("sessionUser", username);
          showDashboard();
        } else {
          alert("Incorrect password!");
        }
      }

      // ===== DASHBOARD =====
      function showDashboard() {
        document.getElementById("login").style.display = "none";
        document.getElementById("signup").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadEmployees();
      }

      // ===== LOGOUT =====
      function logout() {
        localStorage.removeItem("sessionUser");
        location.reload();
      }

      // ===== EMPLOYEE CRUD =====
      function saveEmployee() {
        const name = document.getElementById("emp-name").value.trim();
        const email = document.getElementById("emp-email").value.trim();
        const position = document.getElementById("emp-position").value.trim();

        if (!name || !email || !position) {
          alert("All fields required");
          return;
        }

        let employees = JSON.parse(localStorage.getItem("employees")) || [];

        employees.push({
          id: crypto.randomUUID(),
          name,
          email,
          position,
        });

        localStorage.setItem("employees", JSON.stringify(employees));
        loadEmployees();
      }

      function loadEmployees() {
        const table = document.getElementById("employeeTable");
        table.innerHTML = "";

        const employees = JSON.parse(localStorage.getItem("employees")) || [];

        employees.forEach((emp) => {
          table.innerHTML += `
      <tr>
        <td>${emp.name}</td>
        <td>${emp.email}</td>
        <td>${emp.position}</td>
        <td><button onclick="deleteEmployee('${emp.id}')">Delete</button></td>
      </tr>
    `;
        });
      }

      function deleteEmployee(id) {
        let employees = JSON.parse(localStorage.getItem("employees")) || [];
        employees = employees.filter((emp) => emp.id !== id);
        localStorage.setItem("employees", JSON.stringify(employees));
        loadEmployees();
      }
    </script>
  </head>

  <body>
    <div class="container">
      <!-- LOGIN -->
      <div id="login">
        <h1>Employee System</h1>
        <p>Admin Login</p>
        <form onsubmit="authenticate(event)">
          <div class="form-group">
            <input id="login-username" type="text" required placeholder=" " />
            <label>Username</label>
          </div>

          <div class="form-group">
            <input
              id="login-password"
              type="password"
              required
              placeholder=" "
            />
            <label>Password</label>
          </div>

          <button type="submit">Login</button>
        </form>

        <a href="#" onclick="return show('signup', 'login');">Signup</a>
      </div>

      <!-- SIGNUP -->
      <div id="signup" style="display: none">
        <h1>Employee System</h1>
        <p>Create Admin Account</p>
        <form onsubmit="register(event)">
          <div class="form-group">
            <input id="signup-username" type="text" required placeholder=" " />
            <label>Username</label>
          </div>

          <div class="form-group">
            <input id="signup-email" type="email" required placeholder=" " />
            <label>Email</label>
          </div>

          <div class="form-group">
            <input
              id="signup-password"
              type="password"
              required
              placeholder=" "
            />
            <label>Password</label>
          </div>

          <button type="submit">Sign Up</button>
        </form>

        <a href="#" onclick="return show('login', 'signup');">Login</a>
      </div>

      <!-- DASHBOARD -->
      <div id="dashboard" style="display: none">
        <h1>Employee Dashboard</h1>

        <div class="form-group">
          <input id="emp-name" type="text" placeholder="Employee Name" />
        </div>

        <div class="form-group">
          <input id="emp-email" type="email" placeholder="Employee Email" />
        </div>

        <div class="form-group">
          <input id="emp-position" type="text" placeholder="Position" />
        </div>

        <button onclick="saveEmployee()">Add Employee</button>
        <button onclick="logout()">Logout</button>

        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Position</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="employeeTable"></tbody>
        </table>
      </div>
    </div>
  </body>
</html>
